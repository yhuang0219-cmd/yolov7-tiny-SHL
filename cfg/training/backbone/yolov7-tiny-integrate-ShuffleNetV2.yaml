# parameters
nc: 4 # number of classes
depth_multiple: 1.0  # model depth multiple
width_multiple: 1.0  # layer channel multiple

# anchors
anchors:
  - [ 10,13, 16,30, 33,23 ]  # P3/8
  - [ 30,61, 62,45, 59,119 ]  # P4/16
  - [ 116,90, 156,198, 373,326 ]  # P5/32

# yolov7-tiny backbone
backbone:
  # [from, number, module, args] c2, k=1, s=1, p=None, g=1, act=True
  [ [ -1, 1, CBRM, [ 32 ] ], # 0-P2/4
    [ -1, 1, Shuffle_Block, [ 128, 2 ] ],  # 1-P3/8
    [ -1, 3, Shuffle_Block, [ 128, 1 ] ],  # 2
    [ -1, 1, Shuffle_Block, [ 256, 2 ] ],  # 3-P4/16
    [ -1, 7, Shuffle_Block, [ 256, 1 ] ],  # 4
    [ -1, 1, Shuffle_Block, [ 512, 2 ] ],  # 5-P5/32
    [ -1, 3, Shuffle_Block, [ 512, 1 ] ],  # 6
  ]


# yolov7-tiny head
head:
  [ [ -1, 1, SPPCSPCSIM, [ 256, nn.LeakyReLU(0.1) ] ], # 9-Yolov7-tiny-spp (7)

    [ -1, 1, Conv, [ 128, 1, 1, None, 1, nn.LeakyReLU(0.1) ] ],
    [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ],
    [ 4, 1, Conv, [ 128, 1, 1, None, 1, nn.LeakyReLU(0.1) ] ], # route backbone P4 (10)
    [ [ -1, -2 ], 1, Concat, [ 1 ] ],
    [ -1, 1, yolov7_tiny_E_ELAN, [ 128, 64, nn.LeakyReLU(0.1) ] ], # 14 (12)

    [ -1, 1, Conv, [ 64, 1, 1, None, 1, nn.LeakyReLU(0.1) ] ],
    [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ],
    [ 2, 1, Conv, [ 64, 1, 1, None, 1, nn.LeakyReLU(0.1) ] ], # route backbone P3 (15)
    [ [ -1, -2 ], 1, Concat, [ 1 ] ],
    [ -1, 1, yolov7_tiny_E_ELAN,[ 64, 32,nn.LeakyReLU(0.1) ] ], # 19 (17)

    [ -1, 1, Conv, [ 128, 3, 2, None, 1, nn.LeakyReLU(0.1) ] ],
    [ [ -1, 12 ], 1, Concat, [ 1 ] ],
    [ -1, 1, yolov7_tiny_E_ELAN, [ 128, 64,  nn.LeakyReLU(0.1) ] ], # 22 (20)

    [ -1, 1, Conv, [ 256, 3, 2, None, 1, nn.LeakyReLU(0.1) ] ],
    [ [ -1, 7 ], 1, Concat, [ 1 ] ],
    [ -1, 1, yolov7_tiny_E_ELAN, [ 256, 128, nn.LeakyReLU(0.1) ] ], # 25 (23)

    [ 17, 1, Conv, [ 128, 3, 1, None, 1, nn.LeakyReLU(0.1) ] ], # 26-P3 (24)
    [ 20, 1, Conv, [ 256, 3, 1, None, 1, nn.LeakyReLU(0.1) ] ], # 27-P4 (25)
    [ 23, 1, Conv, [ 512, 3, 1, None, 1, nn.LeakyReLU(0.1) ] ], # 28-P5 (26)

    [ [ 24, 25, 26 ], 1, IDetect, [ nc, anchors ] ],   # Detect(P3, P4, P5)
  ]

